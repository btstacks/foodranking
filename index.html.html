<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Tribunal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #1a1714;
      --card: #221f1b;
      --border: #2e2924;
      --accent-hot: #e8552a;
      --accent-cold: #3a8fd4;
      --accent-sexy: #c84ab5;
      --accent-unsexy: #7a7067;
      --text: #f0ebe4;
      --text-muted: #7a7067;
      --stamp: #e8c84a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 24px 40px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      cursor: pointer;
    }
    .logo span { color: var(--stamp); }

    nav { display: flex; gap: 8px; }

    .nav-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .nav-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .nav-btn.active { color: var(--text); border-color: var(--text-muted); background: var(--surface); }

    /* ── Pages ── */
    .page { display: none; width: 100%; }
    .page.visible { display: flex; flex-direction: column; align-items: center; }

    /* ── Vote Page ── */
    #vote-page {
      max-width: 680px;
      padding: 44px 24px 80px;
      gap: 32px;
    }

    .intro { text-align: center; }
    .intro h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .intro p {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 300;
    }

    .food-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 36px 32px;
      position: relative;
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .corner-tag {
      position: absolute;
      top: 14px; right: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .food-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .food-emoji-wrap {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
    }

    .food-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .vote-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 480px) { .vote-sections { grid-template-columns: 1fr; } }

    .vote-group { display: flex; flex-direction: column; gap: 8px; }

    .vote-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .vote-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 16px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: all 0.16s;
    }
    .vote-btn:hover { background: #272320; }
    .vote-btn.sel-hot  { border-color: var(--accent-hot);  color: var(--accent-hot);  background: #2a1612; }
    .vote-btn.sel-cold { border-color: var(--accent-cold); color: var(--accent-cold); background: #0e1e2e; }
    .vote-btn.sel-sexy   { border-color: var(--accent-sexy);   color: var(--accent-sexy);   background: #2a0e26; }
    .vote-btn.sel-unsexy { border-color: var(--accent-unsexy); color: var(--accent-unsexy); background: #1a1714; }

    .submit-row {
      display: flex;
      gap: 10px;
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }

    .skip-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 15px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.16s;
    }
    .skip-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .submit-btn {
      flex: 1;
      background: var(--stamp);
      color: #0e0c0a;
      border: none;
      padding: 15px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.16s;
      opacity: 0.35;
      pointer-events: none;
    }
    .submit-btn.ready { opacity: 1; pointer-events: all; }
    .submit-btn.ready:hover { background: #f0d055; }

    .vote-counter {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-align: center;
    }
    .vote-counter b { color: var(--stamp); font-weight: 500; }

    /* ── Done card ── */
    .done-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 60px 32px;
      text-align: center;
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .done-card .big-icon { font-size: 3rem; margin-bottom: 18px; }
    .done-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .done-card p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 28px; }
    .cta-btn {
      display: inline-block;
      background: var(--stamp);
      color: #0e0c0a;
      padding: 14px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.16s;
      margin: 4px;
    }
    .cta-btn:hover { background: #f0d055; }
    .cta-btn.secondary {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .cta-btn.secondary:hover { color: var(--text); border-color: var(--text-muted); background: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--stamp);
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Results Page ── */
    #results-page {
      max-width: 1020px;
      padding: 44px 24px 80px;
      gap: 0;
      align-items: stretch;
    }

    .results-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .results-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .results-header p { color: var(--text-muted); font-size: 0.83rem; margin-top: 6px; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .sort-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .sort-btn.active { color: var(--stamp); border-color: var(--stamp); background: #1e1c14; }

    .spacer { flex: 1; }

    .total-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.07em;
    }
    .total-badge b { color: var(--stamp); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 2px solid var(--border); }

    th {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 14px;
      text-align: left;
      white-space: nowrap;
    }
    th:first-child { width: 220px; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.13s; }
    tbody tr:hover { background: var(--surface); }

    td { padding: 14px; vertical-align: middle; }

    .food-cell { display: flex; align-items: center; gap: 11px; }
    .food-cell-emoji { font-size: 1.4rem; width: 32px; text-align: center; }
    .food-cell-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .bar-cell { min-width: 160px; }
    .bar-pair { display: flex; flex-direction: column; gap: 5px; }
    .bar-row { display: flex; align-items: center; gap: 7px; }
    .bar-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      width: 38px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(0.16,1,0.3,1); }
    .bar-fill.hot  { background: var(--accent-hot); }
    .bar-fill.cold { background: var(--accent-cold); }
    .bar-fill.sexy   { background: var(--accent-sexy); }
    .bar-fill.unsexy { background: var(--accent-unsexy); }
    .bar-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      border: 1px solid;
      white-space: nowrap;
    }
    .verdict.hot  { color: var(--accent-hot);  border-color: var(--accent-hot);  background: #2a1612; }
    .verdict.cold { color: var(--accent-cold); border-color: var(--accent-cold); background: #0e1e2e; }
    .verdict.sexy   { color: var(--accent-sexy);   border-color: var(--accent-sexy);   background: #2a0e26; }
    .verdict.unsexy { color: var(--accent-unsexy); border-color: var(--accent-unsexy); background: #1a1714; }
    .verdict.tie  { color: var(--text-muted); border-color: var(--border); }

    .no-data-row td {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }
    /* ── Matrix Page ── */
    #matrix-page {
      padding: 44px 24px 80px;
      align-items: stretch;
    }

    #matrix-inner {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .matrix-header {
      margin-bottom: 32px;
    }
    .matrix-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .matrix-header p {
      color: var(--text-muted);
      font-size: 0.83rem;
      margin-top: 6px;
    }

    .matrix-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 75vh;
      margin: 0 auto;
    }

    .matrix-canvas {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--card);
      border: 1px solid var(--border);
    }

    /* quadrant shading */
    .quadrant {
      position: absolute;
      width: 50%; height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .q-tl { top: 0;   left: 0;   background: rgba(58,143,212,0.06); }
    .q-tr { top: 0;   right: 0;  background: rgba(200,74,181,0.06); }
    .q-bl { bottom:0; left: 0;   background: rgba(100,100,100,0.04); }
    .q-br { bottom:0; right: 0;  background: rgba(232,85,42,0.06); }

    .quadrant-label {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      font-style: italic;
      font-weight: 700;
      opacity: 0.18;
      text-align: center;
      pointer-events: none;
      user-select: none;
      line-height: 1.3;
    }

    /* axis lines */
    .axis-h {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .axis-v {
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 1px;
      background: var(--border);
    }

    /* axis labels */
    .axis-label {
      position: absolute;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.55rem, 1.2vw, 0.68rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      pointer-events: none;
      white-space: nowrap;
    }
    .lbl-cold   { left: 6px;  top: 50%; transform: translateY(-50%); color: var(--accent-cold); }
    .lbl-hot    { right: 6px; top: 50%; transform: translateY(-50%); color: var(--accent-hot); }
    .lbl-unsexy { left: 50%;  bottom: 5px; transform: translateX(-50%); color: var(--accent-unsexy); }
    .lbl-sexy   { left: 50%;  top: 5px;    transform: translateX(-50%); color: var(--accent-sexy); }

    /* food tokens */
    .food-token {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      line-height: 1;
      z-index: 2;
      user-select: none;
    }
    .food-token:hover {
      transform: translate(-50%, -50%) scale(1.5);
      z-index: 20;
      filter: drop-shadow(0 0 6px rgba(232,200,74,0.7));
    }

    /* tooltip */
    .food-tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--stamp);
      padding: 8px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--text);
      pointer-events: none;
      z-index: 50;
      white-space: nowrap;
      display: none;
      line-height: 1.7;
      transform: translate(-50%, -110%);
    }
    .food-tooltip.visible { display: block; }
    .tooltip-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }
    .tooltip-dim { color: var(--text-muted); }
    .tooltip-dim b { color: var(--stamp); font-weight: 500; }

    .matrix-legend {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .legend-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .matrix-empty {
      text-align: center;
      padding: 80px 24px;
    }
    .matrix-empty .icon { font-size: 3rem; margin-bottom: 16px; }
    .matrix-empty h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .matrix-empty p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; }

  </style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('vote')">Food <span>Tribunal</span></div>
  <nav>
    <button class="nav-btn active" id="nav-vote" onclick="showPage('vote')">Vote</button>
    <button class="nav-btn" id="nav-results" onclick="showPage('results')">Results</button>
    <button class="nav-btn" id="nav-matrix" onclick="showPage('matrix')">Matrix</button>
  </nav>
</header>

<!-- ══════════════ VOTE PAGE ══════════════ -->
<div id="vote-page" class="page visible">
  <div class="intro">
    <h1>Judge the Food.</h1>
    <p>Cast your verdict on temperature &amp; sexiness. Every vote counts.</p>
  </div>
  <div id="card-area"></div>
  <div class="vote-counter" id="vote-counter"></div>
</div>

<!-- ══════════════ RESULTS PAGE ══════════════ -->
<div id="results-page" class="page">
  <div class="results-header">
    <div>
      <h1>The Verdicts</h1>
      <p>All votes tallied across every session.</p>
    </div>
  </div>
  <div class="controls">
    <span class="filter-label">Sort:</span>
    <button class="sort-btn active" onclick="setSort('name', this)">Name</button>
    <button class="sort-btn" onclick="setSort('votes', this)">Most Voted</button>
    <button class="sort-btn" onclick="setSort('hot', this)">Hottest</button>
    <button class="sort-btn" onclick="setSort('good', this)">Sexiest</button>
    <div class="spacer"></div>
    <span class="total-badge" id="total-badge"></span>
    <button class="refresh-btn" onclick="renderResults()">↻ Refresh</button>
  </div>
  <div class="table-wrap" id="results-table"></div>
</div>

<!-- ══════════════ MATRIX PAGE ══════════════ -->
<div id="matrix-page" class="page">
  <div id="matrix-inner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Food list ─────────────────────────────────────────────────────────────────
const FOODS = [
  { id:'pizza',         name:'Pizza',             emoji:'🍕' },
  { id:'ice_cream',     name:'Ice Cream',          emoji:'🍦' },
  { id:'sushi',         name:'Sushi',              emoji:'🍣' },
  { id:'hot_dog',       name:'Hot Dog',            emoji:'🌭' },
  { id:'salad',         name:'Salad',              emoji:'🥗' },
  { id:'burger',        name:'Burger',             emoji:'🍔' },
  { id:'broccoli',      name:'Broccoli',           emoji:'🥦' },
  { id:'donut',         name:'Donut',              emoji:'🍩' },
  { id:'soup',          name:'Soup',               emoji:'🍲' },
  { id:'apple',         name:'Apple',              emoji:'🍎' },
  { id:'fries',         name:'Fries',              emoji:'🍟' },

// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'food_tribunal_votes_v3';

function loadVotes() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveVotes(votes) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(votes)); }
  catch(e) { console.error('Storage error', e); }
}

// ── State ─────────────────────────────────────────────────────────────────────
const shuffled = [...FOODS].sort(() => Math.random() - 0.5);
let currentIndex = 0;
let tempChoice   = null;
let sexyChoice   = null;
let sortMode     = 'name';

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById(page + '-page').classList.add('visible');
  document.getElementById('nav-' + page).classList.add('active');

  if (page === 'results') renderResults();
  if (page === 'matrix')  renderMatrix();
}

// ── Vote Page ─────────────────────────────────────────────────────────────────
function renderVote() {
  const area = document.getElementById('card-area');

  if (currentIndex >= shuffled.length) {
    area.innerHTML = `
      <div class="done-card">
        <div class="big-icon">🎖️</div>
        <h2>All foods judged!</h2>
        <p>You've cast a verdict on every item. Check out the results.</p>
        <button class="cta-btn" onclick="showPage('results')">View Results →</button>
        <button class="cta-btn secondary" onclick="restart()">Vote Again</button>
      </div>`;
    document.getElementById('vote-counter').textContent = '';
    return;
  }

  tempChoice  = null;
  sexyChoice  = null;
  const food  = shuffled[currentIndex];
  const votes = loadVotes();
  const total = Object.values(votes).reduce((s, v) => s + (v.hot||0) + (v.cold||0), 0);

  area.innerHTML = `
    <div class="food-card">
      <div class="corner-tag">${currentIndex + 1} / ${shuffled.length}</div>
      <div class="food-visual">
        <div class="food-emoji-wrap">${food.emoji}</div>
        <div class="food-name">${food.name}</div>
      </div>
      <div class="vote-sections">
        <div class="vote-group">
          <div class="vote-label">🌡 Temperature</div>
          <button class="vote-btn" id="btn-hot"    onclick="pick('temp','hot')">🔥 Hot</button>
          <button class="vote-btn" id="btn-cold"   onclick="pick('temp','cold')">🧊 Cold</button>
        </div>
        <div class="vote-group">
          <div class="vote-label">💋 Sexiness</div>
          <button class="vote-btn" id="btn-sexy"   onclick="pick('sexy','sexy')">💋 Sexy</button>
          <button class="vote-btn" id="btn-unsexy" onclick="pick('sexy','unsexy')">🙈 Unsexy</button>
        </div>
      </div>
      <div class="submit-row">
        <button class="skip-btn" onclick="skip()">Skip</button>
        <button class="submit-btn" id="submit-btn" onclick="castVote()">Cast Verdict →</button>
      </div>
    </div>`;

  document.getElementById('vote-counter').innerHTML =
    `<b>${total}</b> total verdict${total !== 1 ? 's' : ''} cast`;
}

function pick(dim, val) {
  if (dim === 'temp') {
    tempChoice = val;
    document.getElementById('btn-hot').className  = 'vote-btn' + (val === 'hot'  ? ' sel-hot'  : '');
    document.getElementById('btn-cold').className = 'vote-btn' + (val === 'cold' ? ' sel-cold' : '');
  } else {
    sexyChoice = val;
    document.getElementById('btn-sexy').className   = 'vote-btn' + (val === 'sexy'   ? ' sel-sexy'   : '');
    document.getElementById('btn-unsexy').className = 'vote-btn' + (val === 'unsexy' ? ' sel-unsexy' : '');
  }
  document.getElementById('submit-btn').className =
    'submit-btn' + (tempChoice && sexyChoice ? ' ready' : '');
}

function castVote() {
  if (!tempChoice || !sexyChoice) return;

  const food  = shuffled[currentIndex];
  const votes = loadVotes();

  if (!votes[food.id]) {
    votes[food.id] = { name: food.name, emoji: food.emoji, hot:0, cold:0, sexy:0, unsexy:0 };
  }
  votes[food.id][tempChoice]++;
  votes[food.id][sexyChoice]++;
  saveVotes(votes);

  currentIndex++;
  showToast('Verdict recorded ✓');
  renderVote();
}

function skip() {
  currentIndex++;
  renderVote();
}

function restart() {
  shuffled.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  renderVote();
}

// ── Results Page ──────────────────────────────────────────────────────────────
function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function badge(a, b, classA, classB, iconA, iconB) {
  if (a === 0 && b === 0) return `<span class="verdict tie">— no votes</span>`;
  if (a === b) return `<span class="verdict tie">⚖️ Tied</span>`;
  return a > b
    ? `<span class="verdict ${classA}">${iconA} ${classA}</span>`
    : `<span class="verdict ${classB}">${iconB} ${classB}</span>`;
}

function renderResults() {
  const votes = loadVotes();

  const rows = FOODS.map(f => {
    const v = votes[f.id] || {};
    return { ...f, hot: v.hot||0, cold: v.cold||0, sexy: v.sexy||0, unsexy: v.unsexy||0 };
  });

  rows.sort((a, b) => {
    if (sortMode === 'name')  return a.name.localeCompare(b.name);
    if (sortMode === 'votes') return (b.hot + b.cold) - (a.hot + a.cold);
    if (sortMode === 'hot')   return b.hot  - a.hot;
    if (sortMode === 'good')  return b.sexy - a.sexy;
    return 0;
  });

  const totalVotes = rows.reduce((s, r) => s + r.hot + r.cold, 0);
  document.getElementById('total-badge').innerHTML =
    `<b>${totalVotes}</b> total verdict${totalVotes !== 1 ? 's' : ''}`;

  if (totalVotes === 0) {
    document.getElementById('results-table').innerHTML = `
      <table><tbody><tr class="no-data-row">
        <td colspan="5">No verdicts yet — go cast some votes!</td>
      </tr></tbody></table>`;
    return;
  }

  const rowsHtml = rows.map(r => {
    const tTotal = r.hot   + r.cold;
    const sTotal = r.sexy  + r.unsexy;
    const hotPct    = tTotal ? Math.round(r.hot    / tTotal * 100) : 0;
    const coldPct   = tTotal ? Math.round(r.cold   / tTotal * 100) : 0;
    const sexyPct   = sTotal ? Math.round(r.sexy   / sTotal * 100) : 0;
    const unsexyPct = sTotal ? Math.round(r.unsexy / sTotal * 100) : 0;

    return `<tr>
      <td><div class="food-cell">
        <span class="food-cell-emoji">${r.emoji}</span>
        <span class="food-cell-name">${r.name}</span>
      </div></td>
      <td class="bar-cell"><div class="bar-pair">
        <div class="bar-row">
          <span class="bar-lbl">🔥 Hot</span>
          <div class="bar-track"><div class="bar-fill hot" style="width:${hotPct}%"></div></div>
          <span class="bar-count">${r.hot}</span>
        </div>
        <div class="bar-row">
          <span class="bar-lbl">🧊 Cold</span>
          <div class="bar-track"><div class="bar-fill cold" style="width:${coldPct}%"></div></div>
          <span class="bar-count">${r.cold}</span>
        </div>
      </div></td>
      <td>${badge(r.hot, r.cold, 'hot','cold','🔥','🧊')}</td>
      <td class="bar-cell"><div class="bar-pair">
        <div class="bar-row">
          <span class="bar-lbl">💋 Sexy</span>
          <div class="bar-track"><div class="bar-fill sexy" style="width:${sexyPct}%"></div></div>
          <span class="bar-count">${r.sexy}</span>
        </div>
        <div class="bar-row">
          <span class="bar-lbl">🙈 Not</span>
          <div class="bar-track"><div class="bar-fill unsexy" style="width:${unsexyPct}%"></div></div>
          <span class="bar-count">${r.unsexy}</span>
        </div>
      </div></td>
      <td>${badge(r.sexy, r.unsexy, 'sexy','unsexy','💋','🙈')}</td>
    </tr>`;
  }).join('');

  document.getElementById('results-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Food</th>
        <th colspan="2">🌡 Temperature</th>
        <th colspan="2">💋 Sexiness</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

// ── Matrix Page ───────────────────────────────────────────────────────────────
function renderMatrix() {
  const inner = document.getElementById('matrix-inner');
  const votes  = loadVotes();

  // Build data: only foods that have at least one vote on BOTH dimensions
  const points = FOODS.map(f => {
    const v = votes[f.id] || {};
    const hot    = v.hot    || 0;
    const cold   = v.cold   || 0;
    const sexy   = v.sexy   || 0;
    const unsexy = v.unsexy || 0;
    const tTotal = hot + cold;
    const sTotal = sexy + unsexy;
    if (tTotal === 0 && sTotal === 0) return null;
    // x: 0 = fully cold, 1 = fully hot
    const x = tTotal > 0 ? hot / tTotal : 0.5;
    // y: 0 = fully unsexy (bottom), 1 = fully sexy (top)
    const y = sTotal > 0 ? sexy / sTotal : 0.5;
    return { ...f, x, y, hot, cold, sexy, unsexy, tTotal, sTotal };
  }).filter(Boolean);

  if (points.length === 0) {
    inner.innerHTML = `
      <div class="matrix-header"><h1>The Matrix</h1><p>No votes yet to plot.</p></div>
      <div class="matrix-empty">
        <div class="icon">📊</div>
        <h2>Nothing to plot yet</h2>
        <p>Cast some votes and the matrix will fill in.</p>
        <button class="cta-btn" onclick="showPage('vote')">Start Voting →</button>
      </div>`;
    return;
  }

  inner.innerHTML = `
    <div class="matrix-header">
      <h1>The Matrix</h1>
      <p>Each food plotted by temperature (x) and sexiness (y). Hover for details.</p>
    </div>
    <div class="matrix-wrap">
      <div class="matrix-canvas" id="matrix-canvas">
        <div class="quadrant q-tl"><div class="quadrant-label">Cold &amp;<br>Sexy</div></div>
        <div class="quadrant q-tr"><div class="quadrant-label">Hot &amp;<br>Sexy</div></div>
        <div class="quadrant q-bl"><div class="quadrant-label">Cold &amp;<br>Unsexy</div></div>
        <div class="quadrant q-br"><div class="quadrant-label">Hot &amp;<br>Unsexy</div></div>
        <div class="axis-h"></div>
        <div class="axis-v"></div>
        <div class="axis-label lbl-cold">🧊 Cold</div>
        <div class="axis-label lbl-hot">Hot 🔥</div>
        <div class="axis-label lbl-unsexy">🙈 Unsexy</div>
        <div class="axis-label lbl-sexy">💋 Sexy</div>
        <div class="food-tooltip" id="food-tooltip">
          <span class="tooltip-name" id="tt-name"></span>
          <span class="tooltip-dim" id="tt-temp"></span><br>
          <span class="tooltip-dim" id="tt-sexy"></span>
        </div>
        ${points.map(p => {
          // map x,y (0-1) to percentage, with 4% padding on each edge
          const left = 4 + p.x * 92;
          const top  = 4 + (1 - p.y) * 92; // invert y so sexy is at top
          const confidence = Math.min(1, (p.tTotal + p.sTotal) / 10);
          const opacity = 0.35 + confidence * 0.65;
          return `<span
            class="food-token"
            style="left:${left}%;top:${top}%;opacity:${opacity.toFixed(2)}"
            data-id="${p.id}"
            data-name="${p.name}"
            data-hot="${p.hot}" data-cold="${p.cold}"
            data-sexy="${p.sexy}" data-unsexy="${p.unsexy}"
            data-x="${left}" data-y="${top}"
            onmouseenter="showTip(this)"
            onmouseleave="hideTip()"
          >${p.emoji}</span>`;
        }).join('')}
      </div>
    </div>
    <div class="matrix-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-hot)"></div> Hot → right</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-cold)"></div> Cold → left</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-sexy)"></div> Sexy → top</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-unsexy)"></div> Unsexy → bottom</div>
      <div class="legend-item" style="color:var(--text-muted);font-size:0.6rem">Opacity = vote confidence</div>
    </div>`;
}

function showTip(el) {
  const tip    = document.getElementById('food-tooltip');
  const hot    = +el.dataset.hot,  cold   = +el.dataset.cold;
  const sexy   = +el.dataset.sexy, unsexy = +el.dataset.unsexy;
  const tTotal = hot + cold, sTotal = sexy + unsexy;
  const hotPct  = tTotal ? Math.round(hot   / tTotal * 100) : '—';
  const sexyPct = sTotal ? Math.round(sexy  / sTotal * 100) : '—';

  document.getElementById('tt-name').textContent = el.dataset.name;
  document.getElementById('tt-temp').innerHTML =
    `🌡 <b>${hotPct}%</b> hot &nbsp;(${tTotal} votes)`;
  document.getElementById('tt-sexy').innerHTML =
    `💋 <b>${sexyPct}%</b> sexy (${sTotal} votes)`;

  // Position tooltip relative to the canvas
  const canvas  = document.getElementById('matrix-canvas');
  const cRect   = canvas.getBoundingClientRect();
  const eRect   = el.getBoundingClientRect();
  const leftPx  = eRect.left - cRect.left + eRect.width / 2;
  const topPx   = eRect.top  - cRect.top;

  tip.style.left = leftPx + 'px';
  tip.style.top  = topPx  + 'px';
  tip.classList.add('visible');
}

function hideTip() {
  document.getElementById('food-tooltip').classList.remove('visible');
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderVote();
